name: CI - TODO Sample

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: course-kiem-thu-tu-dong-voi-ai-va-ci-cd/source-mau-todo-don-gian/package-lock.json

      - name: Install dependencies
        working-directory: course-kiem-thu-tu-dong-voi-ai-va-ci-cd/source-mau-todo-don-gian
        run: npm ci

      - name: Install Playwright browser
        working-directory: course-kiem-thu-tu-dong-voi-ai-va-ci-cd/source-mau-todo-don-gian
        run: npx playwright install --with-deps chromium

      - name: Run Vitest
        working-directory: course-kiem-thu-tu-dong-voi-ai-va-ci-cd/source-mau-todo-don-gian
        run: npm test

      - name: Run Playwright
        working-directory: course-kiem-thu-tu-dong-voi-ai-va-ci-cd/source-mau-todo-don-gian
        run: npm run test:e2e