name: CI - Automated Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: source-mau-cuoi-khoa/package-lock.json

      - name: Install dependencies
        working-directory: source-mau-cuoi-khoa
        run: npm ci

      - name: Install Playwright browser
        working-directory: source-mau-cuoi-khoa
        run: npx playwright install --with-deps chromium

      - name: Run unit and business tests
        working-directory: source-mau-cuoi-khoa
        run: npm test

      - name: Run E2E tests
        working-directory: source-mau-cuoi-khoa
        run: npm run test:e2e