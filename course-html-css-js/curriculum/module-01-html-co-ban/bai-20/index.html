    <h1>Bài 20: Select Dropdown và Textarea</h1>
    <p>Module 1 – HTML Cơ Bản</p> 
  </div>

  <div class="exercise-page">
    <div class="exercise-box">
      <div class="ex-head">
        <h1>📝 Yêu cầu bài tập</h1>
        <p>Tạo form liên hệ với dropdown chọn chủ đề và textarea nhập nội dung.</p>
      </div>
      <div class="ex-desc">
        <h3>Mô tả</h3>
        <p>Thẻ <select> tạo danh sách dropdown để chọn một hoặc nhiều tùy chọn. Thẻ <textarea> cho phép nhập đoạn văn bản nhiều dòng.</p>
        <h3>Yêu cầu</h3>
        <ul>
          <li>Tạo dropdown chọn chủ đề liên hệ (Hỗ trợ/Khiếu nại/Góp ý/Khác)</li>
          <li>Thêm <code>&lt;optgroup&gt;</code> nhóm các tùy chọn</li>
          <li>Tạo textarea 5 hàng nhập nội dung tin nhắn</li>
          <li>Tạo select multiple chọn nhiều quốc gia yêu thích</li>
        </ul>
        <h3>🧠 Kiến thức cần nhớ</h3>
        <ul>
          <li><code>&lt;select&gt;&lt;option&gt;</code>: dropdown chọn 1</li>
          <li><code>&lt;select multiple&gt;</code>: giữ Ctrl/Cmd để chọn nhiều</li>
          <li><code>&lt;optgroup label=''&gt;</code>: nhóm các option</li>
          <li><code>&lt;textarea rows='' cols=''&gt;</code>: ô nhập nhiều dòng</li>
          <li>Textarea không phải self-closing, nội dung mặc định đặt giữa thẻ mở/đóng</li>
        </ul>
      </div>
      <div class="ex-work">
        <h3>💻 Code mẫu</h3>
        <div id="code-highlight">
          <pre id="code-raw" style="display:none">&lt;!-- Dropdown đơn --&gt;
&lt;label for="topic"&gt;Chủ đề:&lt;/label&gt;
&lt;select id="topic" name="topic"&gt;
  &lt;optgroup label="Hỗ trợ"&gt;
    &lt;option value="billing"&gt;Thanh toán&lt;/option&gt;
    &lt;option value="technical"&gt;Kỹ thuật&lt;/option&gt;
  &lt;/optgroup&gt;
  &lt;optgroup label="Phản hồi"&gt;
    &lt;option value="feedback"&gt;Góp ý&lt;/option&gt;
    &lt;option value="complaint"&gt;Khiếu nại&lt;/option&gt;
  &lt;/optgroup&gt;
&lt;/select&gt;

&lt;!-- Dropdown nhiều lựa chọn --&gt;
&lt;label for="country"&gt;Quốc gia yêu thích (Ctrl+click):&lt;/label&gt;
&lt;select id="country" name="country" multiple size="4"&gt;
  &lt;option&gt;Việt Nam&lt;/option&gt;
  &lt;option&gt;Nhật Bản&lt;/option&gt;
  &lt;option&gt;Hàn Quốc&lt;/option&gt;
  &lt;option&gt;Pháp&lt;/option&gt;
&lt;/select&gt;

&lt;!-- Textarea --&gt;
&lt;label for="msg"&gt;Nội dung:&lt;/label&gt;
&lt;textarea id="msg" name="message" rows="5" cols="40"
          placeholder="Nhập tin nhắn của bạn..."&gt;&lt;/textarea&gt;</pre>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { codeToHtml } from 'https://esm.sh/shiki@1';

    const highlighted = await codeToHtml(raw, { lang: 'html', theme: 'github-dark' });

    const pre = document.getElementById('code-highlight').querySelector('pre');
    if (pre) pre.style.cssText = 'border-radius:10px;padding:20px;font-size:0.87rem;overflow-x:auto;margin:0;line-height:1.7';
  </script>
